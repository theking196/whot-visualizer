<!DOCTYPE html>
<html>
<head>
  <title>Whot AI Arena</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;max-width:800px;margin:0 auto}
    h1{background:linear-gradient(90deg,#f59e0b,#ef4444);-webkit-background-clip:text;background-clip:text;color:transparent}
    .score{display:flex;justify-content:space-around;margin:20px 0;background:#1e293b;padding:16px;border-radius:12px}
    .player{text-align:center}
    .table-card{width:80px;height:120px;background:#1e3a5f;border:2px solid #3b82f6;border-radius:10px;margin:20px auto;display:flex;justify-content:center;align-items:center;font-size:24px;color:#f59e0b}
    .hand{display:flex;gap:4px;justify-content:center;margin:12px 0;min-height:60px}
    .card{width:36px;height:54px;background:#2a3f5f;border:2px solid #4a6b8f;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:16px}
    .wild{background:linear-gradient(45deg,#7c3aed,#2563eb);border-color:#a78bfa;color:#fff}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
    .stat{background:#1e293b;padding:12px;border-radius:10px;text-align:center}
    .stat-value{font-size:24px;color:#f59e0b}
    .log{background:#0f172a;padding:12px;border-radius:10px;max-height:300px;overflow-y:auto;font-family:monospace;font-size:13px}
    .entry{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .play{color:#34d399}.draw{color:#f59e0b}.invalid{color:#ef4444}
    .win{text-align:center;padding:12px;background:rgba(245,158,11,0.2);color:#fbbf24;font-weight:bold;margin:10px 0;border-radius:8px}
    button{background:#3b82f6;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;margin:4px}
  </style>
</head>
<body>
  <h1>🎮 Whot AI Arena</h1>
  <div class="score">
    <div class="player">
      <div id="p1name">P1</div>
      <div id="p1cards">-</div>
      <div id="p1status"></div>
    </div>
    <div class="vs">VS</div>
    <div class="player">
      <div id="p2name">P2</div>
      <div id="p2cards">-</div>
      <div id="p2status"></div>
    </div>
  </div>

  <div class="table-card" id="table">?</div>

  <div class="hand" id="hand1"></div>
  <div class="hand" id="hand2"></div>

  <div class="stats">
    <div class="stat"><div id="sTurns">0</div><div>Turns</div></div>
    <div class="stat"><div id="sInvalid">0</div><div>Invalid</div></div>
    <div class="stat"><div id="sDeck">0</div><div>Deck</div></div>
  </div>

  <div class="log" id="log"></div>

  <button onclick="loadData()">Refresh Now</button>

  <script>
    const shapes={star:'★',cross:'✚',triangle:'▲',circle:'●',square:'■'};
    function cardHtml(c){
      if(!c)return'<div class="card">?</div>';
      if(c==='WHOT')return'<div class="card wild">🃏</div>';
      const [s,v]=c.split('-');
      return'<div class="card">'+shapes[s]+'</div>';
    }
    function render(m){
      document.getElementById('p1name').textContent=m.players[0];
      document.getElementById('p2name').textContent=m.players[1];
      document.getElementById('p1cards').textContent=m.finalHands?m.finalHands[m.players[0]]:m.hands[0].length;
      document.getElementById('p2cards').textContent=m.finalHands?m.finalHands[m.players[1]]:m.hands[1].length;
      if(m.winner){
        document.getElementById(m.winner===m.players[0]?'p1status':'p2status').textContent='🏆 WINS!';
      }
      document.getElementById('table').textContent=m.table;
      document.getElementById('hand1').innerHTML=m.hands[0].map(cardHtml).join('');
      document.getElementById('hand2').innerHTML=m.hands[1].map(cardHtml).join('');
      document.getElementById('sTurns').textContent=m.stats.turns;
      document.getElementById('sInvalid').textContent=m.stats.invalid_moves;
      document.getElementById('sDeck').textContent=m.stats.deck_remaining;
      const log=document.getElementById('log');
      log.innerHTML='';
      if(m.winner)log.innerHTML='<div class="win">🏆 '+m.winner+' wins!</div>';
      const recent=(m.moves||[]).slice(-60);
      recent.forEach(mv=>{
        let t=mv.turn+1,cls='play',txt='';
        if(mv.action==='draw'||!mv.valid){cls='draw';txt='Draws '+(mv.card||'?');}
        else{cls='play';txt='Plays '+(mv.cardPlayed||mv.card||'?');if(mv.effect)txt+=' '+mv.effect;}
        log.innerHTML+='<div class="entry '+cls+'">T'+t+': '+txt+'</div>';
      });
      log.scrollTop=log.scrollHeight;
    }
    async function loadData(){
      try{
        const r=await fetch('./matches/latest.json?'+Date.now());
        if(!r.ok)throw new Error(r.status);
        const m=await r.json();
        render(m);
      }catch(e){
        console.error(e);
        document.getElementById('log').innerHTML='<div class="entry invalid">Error loading match: '+e.message+'</div>';
      }
    }
    setInterval(loadData,10000);
    window.onload=loadData;
  </script>
</body>
</html>
